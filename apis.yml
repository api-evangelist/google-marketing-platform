aid: google-marketing-platform
name: Google Marketing Platform Admin API
description: >-
  The Google Marketing Platform Admin API provides programmatic access to manage
  links between Google Marketing Platform organizations and Google Analytics
  accounts. It enables creating, updating, deleting, and listing organization
  links and managing service levels for integrated marketing analytics.
