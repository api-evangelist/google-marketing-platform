apis:
  - aid: google-marketing-platform:admin
    name: Google Marketing Platform Admin API
    description: >-
      The Marketing Platform Admin API enables programmatic management of
      organization-level settings including links to Google Analytics accounts,
      service level configuration, and organization administration.
    humanURL: https://developers.google.com/marketing-platform/devguides/api/admin/v1/rest
